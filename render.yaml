services:
  - type: web
    name: ablacion-corneal-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GITHUB_REPO_URL
        sync: false
      - key: DESKTOP_DOWNLOAD_URL
        sync: false
